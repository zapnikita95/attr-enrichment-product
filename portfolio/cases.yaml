# Машиночитаемые кейсы для proposal_builder и decks
# slide_priority: 1 = топ для презентаций

- id: pharmacy_vision
  vertical: Аптека
  stream: vision
  site_id: 6390
  anonymized_name: "Аптечная сеть"
  partner_hint: Ozerki
  attributes:
    - Original_name
    - OCR упаковки
    - digi_attr_image
  metrics:
    ndcg_at_20_delta: 0.003
    precision_at_20_delta: 0.010
    class_e_delta_pp: 2.6
    class_i_delta_pp: -2.2
    class_s_delta_pp: -0.5
    class_c_delta_pp: 0.1
  story: >
    Запрос «стельки» в выдачу попадал чай для сосудов из-за бедного описания.
    После OCR с упаковки — корректный товар в топе. Class E вырос на 2.6 п.п.,
    Class I (нерелевантная выдача) снизился на 2.2 п.п.
  proof_source:
    - user_screenshot
    - ozerki_attribute_impact_data.json
  slide_priority: 1

- id: jewelry_form
  vertical: Ювелирка
  stream: vision
  anonymized_name: "Ювелирный ритейлер"
  attributes:
    - form
    - metal_color
    - digi_attr_pattern
  metrics:
    zero_queries_reduction_pct: 33
    ndcg_avg_increase_pct: 9
  story: >
    Форма украшения (змея, череп, сердце) — запросы без результата закрыты.
    Нулевая выдача −33%, NDCG@20 в среднем +9% после атрибутов form и metal_color.
  proof_source:
    - jewelry_benchmark_results
  slide_priority: 1

